<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- Load SAPUI5 -->
    <script
        id="sap-ui-bootstrap"
        src="https://sdk.openui5.org/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_fiori_3"
        data-sap-ui-libs="sap.m">
    </script>
    <script>
        sap.ui.getCore().attachInit(function(){
            new sap.m.Button({
                text: "Click Me",
                type: "Emphasized",
                press: function(){
                    sap.m.MessageToast.show("Hello from SAPUI5!");
                }
            }).placeAt("content");
        });
    </script>
</head>
<body id="content" class="sapUiBody"></body>
</html>
